<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History of Metal</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        body { background-color: #09090b; } /* Extra dark zinc */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #dc2626; border-radius: 10px; }
    </style>
</head>
<body class="text-zinc-100 font-sans selection:bg-red-600 selection:text-white">

    <nav class="flex justify-between items-center p-6 border-b border-zinc-800 bg-zinc-950/80 backdrop-blur-md sticky top-0 z-50">
        <div class="text-2xl font-black tracking-widest text-red-600">METAL.LOG</div>
        <div class="hidden md:flex space-x-8 font-bold uppercase text-xs tracking-widest">
            <a href="historyofmetal.html" class="text-red-500 underline decoration-2 underline-offset-8">History</a>
            <a href="notablebands.html" class="hover:text-red-500 transition">Notable Bands</a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto py-20 px-6">
        <header class="mb-16">
            <p id="greeting" class="text-red-500 font-mono text-sm mb-2"></p>
            <h1 class="text-7xl font-black mb-4">THE CHRONICLES</h1>
            <p class="text-zinc-500 text-lg">Tracing the distortion from 1970 to eternity.</p>
        </header>
        
        <div class="space-y-16">
            <section class="group relative pl-8 border-l border-zinc-800 hover:border-red-600 transition-colors">
                <div class="absolute -left-1.5 top-0 w-3 h-3 bg-zinc-800 group-hover:bg-red-600 rounded-full transition-colors"></div>
                <h2 class="text-3xl font-bold">1970: The Omen</h2>
                <p class="text-zinc-400 mt-4 leading-relaxed text-lg">Black Sabbath drops their debut. The world gets a lot louder and a lot darker.</p>
            </section>
            <!-- Add more sections here -->
             <div class="h-[1000px]"></div> <!-- Spacer to test scroll button -->
        </div>
    </main>

    <!-- Scroll to Top Button -->
    <button id="toTop" class="fixed bottom-8 right-8 bg-red-600 p-4 rounded-full shadow-2xl opacity-0 translate-y-10 transition-all duration-300 hover:bg-red-700">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
    </button>

    <script>
        // 1. Dynamic Greeting
        const hour = new Date().getHours();
        const greetElement = document.getElementById('greeting');
        if (hour < 12) greetElement.innerText = "GOOD MORNING, HEADBANGER";
        else if (hour < 18) greetElement.innerText = "GOOD AFTERNOON, HEADBANGER";
        else greetElement.innerText = "GOOD EVENING, HEADBANGER";

        // 2. Scroll to Top Logic
        const toTopBtn = document.getElementById('toTop');
        window.onscroll = () => {
            if (document.body.scrollTop > 400 || document.documentElement.scrollTop > 400) {
                toTopBtn.classList.remove('opacity-0', 'translate-y-10');
            } else {
                toTopBtn.classList.add('opacity-0', 'translate-y-10');
            }
        };
        toTopBtn.onclick = () => window.scrollTo({top: 0, behavior: 'smooth'});
    </script>
    <!-- Music Player Bar -->
<footer class="fixed bottom-0 w-full bg-zinc-950/90 backdrop-blur-xl border-t border-zinc-800 p-4 z-[100]">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
        
        <!-- Track Info -->
        <div class="flex items-center space-x-4 w-1/3">
            <div class="w-12 h-12 bg-red-600 rounded flex items-center justify-center font-black text-xs shadow-lg shadow-red-900/20">
                DISK
            </div>
            <div>
                <h4 id="track-title" class="text-sm font-bold truncate">Black Sabbath</h4>
                <p id="track-artist" class="text-xs text-zinc-500 uppercase tracking-tighter">Black Sabbath</p>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex flex-col items-center w-1/3">
            <div class="flex items-center space-x-6">
                <button class="text-zinc-400 hover:text-white transition">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M8.445 14.832A1 1 0 0010 14V6a1 1 0 00-1.555-.832l-6 4a1 1 0 000 1.664l6 4zM16.445 14.832A1 1 0 0018 14V6a1 1 0 00-1.555-.832l-6 4a1 1 0 000 1.664l6 4z"></path></svg>
                </button>
                
                <!-- Play/Pause Button -->
                <button id="play-btn" class="bg-white text-black p-3 rounded-full hover:scale-110 transition active:scale-95">
                    <svg id="play-icon" class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
                </button>

                <button class="text-zinc-400 hover:text-white transition">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M4.555 5.168A1 1 0 003 6v8a1 1 0 001.555.832l6-4a1 1 0 000-1.664l-6-4zM11.555 5.168A1 1 0 0010 6v8a1 1 0 001.555.832l6-4a1 1 0 000-1.664l-6-4z"></path></svg>
                </button>
            </div>

            <!-- Progress Bar -->
            <div class="w-full mt-3 flex items-center space-x-2">
                <span class="text-[10px] text-zinc-500 font-mono">0:42</span>
                <div class="flex-1 h-1 bg-zinc-800 rounded-full overflow-hidden">
                    <div id="progress" class="h-full bg-red-600 w-1/3 transition-all duration-1000"></div>
                </div>
                <span class="text-[10px] text-zinc-500 font-mono">3:50</span>
            </div>
        </div>

        <!-- Volume/Extras -->
        <div class="hidden md:flex items-center justify-end space-x-4 w-1/3">
            <svg class="w-5 h-5 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>
            <div class="w-20 h-1 bg-zinc-800 rounded-full">
                <div class="h-full bg-zinc-400 w-2/3"></div>
            </div>
        </div>
    </div>
</footer>

<script>
    const playBtn = document.getElementById('play-btn');
    const playIcon = document.getElementById('play-icon');
    const progressBar = document.getElementById('progress');
    let isPlaying = false;
    let progressPercent = 33;

    // Toggle Play/Pause UI
    playBtn.addEventListener('click', () => {
        isPlaying = !isPlaying;
        
        if (isPlaying) {
            // Change to Pause Icon
            playIcon.innerHTML = '<path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path>';
            playBtn.classList.replace('text-black', 'text-red-600');
        } else {
            // Change back to Play Icon
            playIcon.innerHTML = '<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path>';
            playBtn.classList.replace('text-red-600', 'text-black');
        }
    });

    // Simulate progress movement when "playing"
    setInterval(() => {
        if (isPlaying && progressPercent < 100) {
            progressPercent += 0.5;
            progressBar.style.width = progressPercent + "%";
        }
    }, 1000);
</script>
</body>
</html>
